name: Mi primer CI

#Trigers
on:
  push:
  pull_request:

# Jobs
jobs:
  # Linterna: chequea el codigo con ruff
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run linter
      run: ruff check .  


  test:
  # Este job depende del job de lint, es decir, se ejecutará solo si el job de lint se ejecuta correctamente
  # tests: ejecuta los tests con pytest
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.13"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run tests
      run: pytest tests/


  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Build docker image
      run: docker build -t my-first-github-actions-wf .